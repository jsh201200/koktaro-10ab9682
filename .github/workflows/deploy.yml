name: Deploy Supabase Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 최신 v4 버전으로 변경 (Node 24 대응)
      - uses: actions/checkout@v4

      # 2. Supabase CLI 최신 설정
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # 3. 배포 실행 (에러 방지를 위해 토큰/ID 확인)
      - name: Deploy howl-chat
        run: supabase functions deploy howl-chat --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy discord-alert
        run: supabase functions deploy discord-alert --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

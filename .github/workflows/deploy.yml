name: Deploy Supabase Functions

on:
  push:
    branches:
      - main

# 2026년 최신 노드 버전 강제 설정
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 최신 v4 버전 사용
      - uses: actions/checkout@v4

      # 2. Supabase CLI 설치
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # 3. 배포 실행
      - name: Deploy howl-chat
        run: supabase functions deploy howl-chat --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy discord-alert
        run: supabase functions deploy discord-alert --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
